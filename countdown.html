<uiView
  onLoad="
    var g = typeof globalThis !== 'undefined' ? globalThis : (typeof window !== 'undefined' ? window : Function('return this')());
    g.g = g;
    g.countVal = 5;
    g.animTick = 0;

    g.isNeg = function(num) {
      return num.toString().charAt(0) === '-';
    };

    g.isPosOrZero = function(num) {
      return num.toString().charAt(0) !== '-';
    };

    g.getEcgY = function(x_canvas) {
      var w = g.w_val || 454;
      var x_orig = x_canvas * (576 / w);
      var val = 0;
      
      if (g.isPosOrZero(x_orig - 160)) {
        if (g.isPosOrZero(380 - x_orig)) {
          if (g.isNeg(x_orig - 245)) {
            val = Math.sin((x_orig - 160) / 85 * Math.PI) * 61;
          } else if (g.isNeg(x_orig - 286)) {
            val = Math.sin((x_orig - 245) / 41 * Math.PI) * -80;
          } else if (g.isNeg(x_orig - 328)) {
            if (g.isNeg(x_orig - 312)) {
              var t = (x_orig - 286) / 26;
              val = 139 * (t * t);
            } else {
              val = 139 * (328 - x_orig) / 16;
            }
          } else if (g.isNeg(x_orig - 345)) {
            val = Math.sin((x_orig - 328) / 17 * Math.PI) * -13;
          } else {
            val = Math.sin((x_orig - 345) / 35 * Math.PI) * 52;
          }
        }
      }
      return -val * (w / 576);
    };

    g.drawCountdownBg = function(ctx) {
      var w = ctx.width;
      g.w_val = w;
      var cx = w / 2;
      var cy = w / 2;
      var rH = w / 2 - 14;
      var dyH = 0.15 * w - cy;

      // 1. Banner amarillo
      if (g.isPosOrZero(rH - Math.abs(dyH))) {
        var endH = Math.asin(dyH / rH);
        ctx.beginPath();
        ctx.arc(cx, cy, rH, -Math.PI - endH, endH, false);
        ctx.closePath();
        ctx.fillStyle = '#FFE322';
        ctx.fill();
      }

      // 2. Corchete 
      if (g.isPosOrZero(g.countVal - 5)) {
        var bx = cx + cx * 0.72;
        var by = cy - cy * 0.52;
        var bLen = 12;
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.moveTo(bx - bLen, by);
        ctx.lineTo(bx, by);
        ctx.lineTo(bx, by + bLen);
        ctx.stroke();
      }

      // ==========================================
      // 3. ECG REALISTA DE ALTA PRECISIÓN (ANIMADO)
      // ==========================================
      var yPulse = cy + 50; 

      ctx.lineWidth = 3;
      ctx.lineCap = 'round';

      var cycleTicks = 15; // 1.5s ciclo completo (15 ticks a 10Hz)
      var currentTick = g.animTick % cycleTicks;
      var sweepX = (currentTick / cycleTicks) * w;
      var gap = 12; 

      // 1. Trazado de la onda nueva (hasta sweepX)
      var lastColorNew = '';
      for (var x = 0; g.isPosOrZero(sweepX - x); x += 2) {
        var x_orig = x * (576 / w);
        var color = '#00E5FF';
        if (g.isNeg(x_orig - 245)) {
          color = '#FF2975';
        } else if (g.isPosOrZero(x_orig - 286)) {
          if (g.isNeg(x_orig - 328)) {
            color = '#FF2975';
          }
        }
        
        if (color !== lastColorNew) {
          if (x !== 0) {
            ctx.stroke();
          }
          ctx.beginPath();
          ctx.strokeStyle = color;
          ctx.moveTo(x - 2, yPulse + g.getEcgY(x - 2));
          ctx.lineTo(x, yPulse + g.getEcgY(x));
          lastColorNew = color;
        } else {
          ctx.lineTo(x, yPulse + g.getEcgY(x));
        }
      }
      if (lastColorNew !== '') ctx.stroke();

      // 2. Trazado de la onda vieja (desde sweepX + gap hasta w)
      var lastColorOld = '';
      for (var x = sweepX + gap; g.isPosOrZero(w - x); x += 2) {
        var x_orig = x * (576 / w);
        var color = '#00E5FF';
        if (g.isNeg(x_orig - 245)) {
          color = '#FF2975';
        } else if (g.isPosOrZero(x_orig - 286)) {
          if (g.isNeg(x_orig - 328)) {
            color = '#FF2975';
          }
        }
        
        if (color !== lastColorOld) {
          if (g.isPosOrZero(x - (sweepX + gap + 2))) {
            ctx.stroke();
          }
          ctx.beginPath();
          ctx.strokeStyle = color;
          ctx.moveTo(x - 2, yPulse + g.getEcgY(x - 2));
          ctx.lineTo(x, yPulse + g.getEcgY(x));
          lastColorOld = color;
        } else {
          ctx.lineTo(x, yPulse + g.getEcgY(x));
        }
      }
      if (lastColorOld !== '') ctx.stroke();

      // 3. Cabezal brillante en la punta del barrido
      if (g.isPosOrZero(sweepX)) {
        var headY = yPulse + g.getEcgY(sweepX);
        var x_orig = sweepX * (576 / w);
        var headColor = '#00E5FF';
        if (g.isNeg(x_orig - 245)) {
          headColor = '#FF2975';
        } else if (g.isPosOrZero(x_orig - 286)) {
          if (g.isNeg(x_orig - 328)) {
            headColor = '#FF2975';
          }
        }
        
        ctx.beginPath();
        ctx.arc(sweepX, headY, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = headColor;
        ctx.fill();
      }
    };

    g.onCountdownChange = function(targetData) {
      g.countVal = Number(targetData) || 0;
      control('#countBgCanvas', 'REFRESH');

      if (g.countVal === 0) {
          setStyle('#text-num', 'visibility', 'hidden');
          setStyle('#text-go', 'visibility', 'visible');
      } else {
          setStyle('#text-num', 'visibility', 'visible');
          setStyle('#text-go', 'visibility', 'hidden');
      }
    };

    g.activateCountdown = function() {
      g.animTick = 0;
      g.tickSub = $.subscribe('/Dev/Time/Tick10hz', function() {
        g.animTick++;
        if (g.animTick > 10000) g.animTick = 0;
        control('#countBgCanvas', 'REFRESH');
      });
    };

    g.deactivateCountdown = function() {
      if (g.tickSub) {
        $.unsubscribe(g.tickSub);
        g.tickSub = null;
      }
    };
  "
  onActivate="g.activateCountdown();"
  onDeactivate="g.deactivateCountdown();"
>
    <div style="background-color:#111111; width:100%; height:100%; position:absolute; top:0; left:0;">

        <object type="canvas" id="countBgCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%;" build="ctx => g.drawCountdownBg(ctx);" />

        <div class="sp-t-m p-hc" style="top:5%; color:#000000; font-weight:bold; position:absolute;">
            START
        </div>

        <div id="text-go" class="p-hc" style="top:calc(38% - 50%e); color:#FFE322; position:absolute; font-size:60px; font-weight:bold; visibility:hidden;">
            GO
        </div>

        <div id="text-num" class="p-hc" style="top:calc(38% - 50%e); color:#FFE322; position:absolute; font-size:60px; font-weight:bold;">
            <eval input="/Zapp/{zapp_index}/Output/countdown"
                  outputFormat="script x => (x === 5 ? '5' : (x === 4 ? '4' : (x === 3 ? '3' : (x === 2 ? '2' : (x === 1 ? '1' : ' ')))))"
                  default="5"
                  onValueChanged="g.onCountdownChange(targetData);" />
        </div>

        <:if test="{{ HAS_ON_EVENT }}">
        <userInput>
          <pushButton name="up" type="lock" longType="lock"
            onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');" />
        </userInput>
        </:if>

    </div>
</uiView>
